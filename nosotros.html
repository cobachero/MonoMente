<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quiénes Somos? - Proyecto Social</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .info-card {
            backdrop-filter: blur(15px);
            background-color: rgba(255, 255, 255, 0.22);
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            margin-bottom: 30px;
        }

        .info-card h1 {
            margin-bottom: 18px;
        }

        .info-card p {
            line-height: 1.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="vines"></div>

        <main class="content">
            <div class="text-section">
                <div class="info-card">
                    <h1>¿Quienes Somos?</h1>
                    <p>
                        Somos un proyecto social y educativo dedicado a brindarte herramientas para manejar el estrés académico. Aquí encontrarás consejos reales para momentos reales.
                    </p>
                </div>
                <a href="encuesta.html" class="btn-start">Quiero empezar</a>
            </div>

            <div class="image-section">
                <img src="monos-ilustracion.png" alt="Ilustración de monos apoyándose" class="monkeys-img">
            </div>
        </main>
    </div>

</body>
</html>
